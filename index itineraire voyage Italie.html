<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Italie — Itinéraire</title>
<meta name="theme-color" content="#F6F2E9">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<link rel="manifest" href="manifest.json">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500&family=Prata&family=Caveat:wght@500;600&display=swap" rel="stylesheet">
<style>
:root{
  --paper:#F6F2E9; --card:#FFFDF7; --ink:#2A251E; --soft:#6E6455;
  --sand:#E6DCC8; --line:#DCD2BE;
  --ochre:#A9682A; --teal:#16544F; --indigo:#2F3D8C; --alert:#9B3B1F;
  --display:'Prata',Georgia,serif;
  --hand:'Caveat',cursive;
  --mono:'Fira Code',ui-monospace,SFMono-Regular,Menlo,monospace;
  --body:'Fira Code',ui-monospace,Menlo,monospace;
  --pad:18px; --r:3px;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0}
body{
  background:var(--paper); color:var(--ink); font-family:var(--body);
  font-size:13.5px; line-height:1.62; overscroll-behavior-y:none;
  background-image:
    radial-gradient(circle at 12% 8%, rgba(169,104,42,.035), transparent 42%),
    radial-gradient(circle at 88% 72%, rgba(22,84,79,.04), transparent 46%);
}
.app{max-width:560px;margin:0 auto;padding-bottom:104px}
button{font:inherit;color:inherit;border:0;background:none;cursor:pointer}
a{color:inherit}

/* ---------- barre du haut ---------- */
.top{
  position:sticky;top:0;z-index:20;background:var(--paper);
  border-bottom:1px solid var(--line);
  padding:calc(env(safe-area-inset-top) + 12px) var(--pad) 0;
}
.brand{display:flex;align-items:baseline;justify-content:space-between;gap:10px}
.brand h1{
  font-family:var(--display);font-weight:400;font-size:20px;margin:0;
  letter-spacing:.005em;
}
.brand h1 span{color:var(--ochre)}
.sync{
  font-family:var(--mono);font-size:10px;letter-spacing:.06em;text-transform:uppercase;
  color:var(--soft);display:flex;align-items:center;gap:6px;white-space:nowrap;
  border:0;padding:4px 0;
}
.dot{width:6px;height:6px;border-radius:50%;background:var(--soft);flex:none}
.sync.ok .dot{background:var(--teal)}
.sync.off .dot{background:var(--ochre)}
.sync.load .dot{background:var(--indigo);animation:pulse 1s infinite}
@keyframes pulse{50%{opacity:.25}}

/* ---------- pastilles de jours ---------- */
.days{display:flex;gap:7px;overflow-x:auto;padding:11px 0 10px;scroll-snap-type:x proximity;
  scrollbar-width:none;-ms-overflow-style:none}
.days::-webkit-scrollbar{display:none}
.chip{
  flex:none;scroll-snap-align:center;border:1px solid var(--line);border-radius:var(--r);
  background:var(--card);padding:5px 10px 6px;min-width:60px;text-align:left;
  transition:border-color .15s,background .15s;
}
.chip b{display:block;font-family:var(--mono);font-size:12px;font-weight:500;letter-spacing:.04em}
.chip i{display:block;font-style:normal;font-size:10px;color:var(--soft);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:78px;margin-top:1px}
.chip.on{background:var(--teal);border-color:var(--teal);color:#FBF8F0}
.chip.on i{color:rgba(251,248,240,.72)}
.chip.today:not(.on){border-color:var(--ochre)}
.chip:focus-visible{outline:2px solid var(--indigo);outline-offset:2px}

/* ---------- entête de journée ---------- */
.hero{position:relative;height:184px;overflow:hidden;background:var(--sand)}
.hero img{width:100%;height:100%;object-fit:cover;display:block}
.hero::after{content:'';position:absolute;inset:auto 0 0;height:64px;
  background:linear-gradient(to bottom,rgba(246,242,233,0),var(--paper))}
.dayhead{position:relative;padding:20px 16px 18px;background:var(--card);
  border:1px solid var(--line);border-radius:var(--r);margin:-54px 14px 0;z-index:2;
  box-shadow:0 2px 14px rgba(42,37,30,.07)}
.dayhead.nohero{margin-top:14px}
.eyebrow{font-family:var(--mono);font-size:10.5px;letter-spacing:.12em;text-transform:uppercase;color:var(--soft)}
.dayno{font-family:var(--display);font-size:52px;line-height:.92;font-weight:400;color:var(--ochre);margin:6px 0 0}
.dayno small{font-size:17px;letter-spacing:.1em;text-transform:uppercase;font-family:var(--mono);color:var(--soft);display:block;margin-bottom:2px}
.daytitle{font-family:var(--display);font-size:21px;font-weight:400;margin:8px 0 0;line-height:1.2}
.daysub{font-family:var(--hand);font-size:19px;color:var(--teal);margin:3px 0 0;line-height:1.25}
.leg{
  display:inline-flex;align-items:center;gap:7px;margin-top:13px;
  font-family:var(--mono);font-size:11px;letter-spacing:.03em;
  border:1px dashed var(--teal);color:var(--teal);padding:5px 9px;border-radius:var(--r);
}
.stamp{
  position:absolute;top:16px;right:12px;transform:rotate(-11deg);
  border:2px solid var(--indigo);color:var(--indigo);border-radius:2px;
  font-family:var(--mono);font-size:10px;font-weight:500;letter-spacing:.13em;
  padding:4px 7px;opacity:.72;
}

/* ---------- blocs ---------- */
.sect{padding:18px var(--pad) 0}
.sect h3{
  font-family:var(--mono);font-size:10.5px;letter-spacing:.12em;text-transform:uppercase;
  color:var(--soft);margin:0 0 10px;font-weight:500;
  display:flex;align-items:center;gap:9px;
}
.sect h3::after{content:'';flex:1;height:1px;background:var(--line)}
.card{background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:13px 14px}
.alerte{border-left:3px solid var(--alert);background:#FCF4EF;font-size:13.5px;color:#5A3325}
.alerte b{color:var(--alert);font-family:var(--mono);font-size:10.5px;letter-spacing:.1em;
  text-transform:uppercase;display:block;margin-bottom:4px}

/* ---------- le rail : signature ---------- */
.rail{position:relative;margin:0;padding:2px 0 0 0;list-style:none}
.rail::before{content:'';position:absolute;left:6px;top:12px;bottom:14px;width:1px;background:var(--line)}
.step{position:relative;padding:0 0 16px 30px}
.mark{position:absolute;left:0;top:5px;width:13px;height:13px;display:grid;place-items:center}
.mark i{display:block;width:9px;height:9px;border-radius:50%;background:var(--paper);
  border:1.5px solid var(--teal);box-sizing:border-box}
.step.transport .mark i{border-radius:1px;background:var(--teal);width:9px;height:9px}
.step.option .mark i{border-color:var(--soft);border-style:dashed;background:var(--paper)}
.step .h{font-family:var(--mono);font-size:11px;color:var(--indigo);letter-spacing:.04em;margin-bottom:1px}
.step .t{font-size:13.5px;line-height:1.45}
.step .d{font-size:12.5px;color:var(--soft);margin-top:3px;line-height:1.4}
.step.option .t{color:var(--soft)}
.maps{
  display:inline-flex;align-items:center;gap:5px;margin-top:7px;
  font-family:var(--mono);font-size:10.5px;letter-spacing:.05em;text-transform:uppercase;
  color:var(--teal);border:1px solid var(--line);background:var(--card);
  padding:5px 9px;border-radius:var(--r);text-decoration:none;
}
.maps:active{background:var(--sand)}
.maps svg{width:11px;height:11px;flex:none}

/* ---------- rangées d'information ---------- */
.row{display:flex;gap:12px;padding:9px 0;border-bottom:1px solid var(--line);font-size:13px}
.row:last-child{border-bottom:0}
.row .k{font-family:var(--mono);font-size:10.5px;letter-spacing:.06em;text-transform:uppercase;
  color:var(--soft);flex:none;width:96px;padding-top:2px}
.row .v{flex:1;min-width:0;word-break:break-word}
.row .v em{font-style:normal;color:var(--soft);font-family:var(--mono);font-size:12px}

/* ---------- cases à cocher ---------- */
.check{display:flex;gap:11px;align-items:flex-start;padding:10px 0;border-bottom:1px solid var(--line);
  width:100%;text-align:left}
.check:last-child{border-bottom:0}
.box{flex:none;width:17px;height:17px;border:1.5px solid var(--teal);border-radius:2px;margin-top:1px;
  display:grid;place-items:center;background:var(--card)}
.box svg{width:11px;height:11px;opacity:0;transition:opacity .12s}
.check.done .box{background:var(--teal)}
.check.done .box svg{opacity:1}
.check.done .lbl{color:var(--soft);text-decoration:line-through;text-decoration-thickness:1px}
.lbl{flex:1;font-size:13px;line-height:1.45}
.who{font-family:var(--mono);font-size:10.5px;color:var(--indigo);letter-spacing:.04em;margin-top:2px;display:block}
.progress{font-family:var(--mono);font-size:11px;color:var(--soft);letter-spacing:.04em}

/* ---------- boutons pleine largeur ---------- */
.big{display:flex;align-items:center;justify-content:space-between;gap:10px;width:100%;
  background:var(--card);border:1px solid var(--line);border-radius:var(--r);
  padding:13px 14px;margin-bottom:9px;text-decoration:none;font-size:13.5px}
.big span.m{font-family:var(--mono);font-size:10.5px;letter-spacing:.07em;text-transform:uppercase;color:var(--soft)}
.big:active{background:var(--sand)}
.empty{font-size:13.5px;color:var(--soft);font-style:italic}

/* ---------- barre du bas ---------- */
.tabs{
  position:fixed;left:0;right:0;bottom:0;z-index:30;display:flex;
  background:var(--paper);border-top:1px solid var(--line);
  padding-bottom:env(safe-area-inset-bottom);
}
.tab{flex:1;padding:11px 4px 12px;display:flex;flex-direction:column;align-items:center;gap:4px;
  font-family:var(--mono);font-size:10px;letter-spacing:.07em;text-transform:uppercase;color:var(--soft)}
.tab svg{width:18px;height:18px}
.tab.on{color:var(--teal)}
.tab:focus-visible{outline:2px solid var(--indigo);outline-offset:-3px}

.foot{padding:26px var(--pad) 8px;text-align:center}
.foot p{font-family:var(--hand);font-size:18px;color:var(--soft);margin:0;line-height:1.35}

.sheetbox{margin-top:10px}
.sheetbox input{width:100%;font-family:var(--mono);font-size:12px;padding:10px 11px;
  border:1px solid var(--line);border-radius:var(--r);background:var(--card);color:var(--ink)}
.sheetbox input:focus{outline:2px solid var(--indigo);outline-offset:1px}
.hint{font-size:12px;color:var(--soft);margin:7px 0 0;line-height:1.45}

/* ---------- décisions ouvertes ---------- */
.opt{border:1px solid var(--line);border-radius:var(--r);background:var(--card);padding:12px 13px;margin-bottom:9px}
.opt.choisi{border-color:var(--teal);border-left:3px solid var(--teal);background:#F4F8F6}
.opt.ecarte{opacity:.5}
.opt h4{margin:0;font-family:var(--display);font-size:16px;font-weight:400}
.opt p{margin:3px 0 0;font-size:12.5px;color:var(--soft);line-height:1.45}
.opt .actes{display:flex;gap:7px;margin-top:10px;flex-wrap:wrap}
.bt{font-family:var(--mono);font-size:10.5px;letter-spacing:.05em;text-transform:uppercase;
  border:1px solid var(--line);background:var(--paper);padding:6px 10px;border-radius:var(--r);color:var(--soft)}
.bt.oui{border-color:var(--teal);color:var(--teal)}
.bt:active{background:var(--sand)}
.etat{font-family:var(--mono);font-size:10px;letter-spacing:.08em;text-transform:uppercase;
  color:var(--teal);display:block;margin-bottom:4px}
.etat.gris{color:var(--soft)}
.fixe{font-family:var(--mono);font-size:9.5px;letter-spacing:.09em;text-transform:uppercase;
  color:var(--ochre);border:1px solid var(--ochre);border-radius:2px;padding:1px 4px;margin-left:6px;
  vertical-align:1px;white-space:nowrap}
.step.fige .mark i{background:var(--ochre);border-color:var(--ochre)}
/* ---------- composeur ---------- */
.compo{display:flex;gap:7px;margin-top:10px}
.compo textarea{flex:1;font:inherit;font-size:13px;padding:9px 10px;border:1px solid var(--line);
  border-radius:var(--r);background:var(--paper);color:var(--ink);resize:vertical;min-height:44px}
.compo textarea:focus{outline:2px solid var(--indigo);outline-offset:1px}
/* ---------- confirmation ---------- */
#toast{position:fixed;left:50%;bottom:78px;transform:translateX(-50%) translateY(14px);z-index:60;
  background:var(--ink);color:var(--paper);font-family:var(--mono);font-size:11px;letter-spacing:.04em;
  padding:9px 15px;border-radius:var(--r);opacity:0;pointer-events:none;transition:opacity .2s,transform .2s;
  max-width:86vw;text-align:center}
#toast.on{opacity:1;transform:translateX(-50%) translateY(0)}
@media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
</style>

   "nom": "Enterprise — La Spezia",

 ],
 "notes": []

/* --- Identifiant du Google Sheet. Se colle aussi depuis l'onglet Infos. --- */
let SHEET_ID = "";

const ONGLETS = ["Config","Jours","Activites","Logistique","Checklist_Groupe","Checklist_Perso","Contacts","Notes_Terrain","Options"];

/* ---------- stockage tolérant (localStorage, sinon mémoire) ---------- */
const mem = {};
const store = {
  get(k){ try{ const v = localStorage.getItem(k); return v===null? (k in mem? mem[k]:null) : v; }catch(e){ return k in mem? mem[k]:null; } },
  set(k,v){ mem[k]=v; try{ localStorage.setItem(k,v); }catch(e){} }
};
const jget = (k,d)=>{ try{ const v=store.get(k); return v? JSON.parse(v):d; }catch(e){ return d; } };
const jset = (k,v)=> store.set(k, JSON.stringify(v));

/* ---------- état ---------- */
let DATA = jget("cache_data", null) || SEED;
let etat = { tab:"jour", jour:1 };
let SCRIPT_URL = store.get("script_url") || "";
let MOI = store.get("moi") || "";
SHEET_ID = store.get("sheet_id") || SHEET_ID;

/* ---------- utilitaires ---------- */
const el = (h)=>{ const d=document.createElement("div"); d.innerHTML=h.trim(); return d.firstElementChild; };
const esc = (s)=> String(s==null?"":s).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
const maps = (q)=> "https://www.google.com/maps/search/?api=1&query="+encodeURIComponent(q);
const MOIS = ["janv.","févr.","mars","avr.","mai","juin","juill.","août","sept.","oct.","nov.","déc."];
const JOURS_SEM = ["dim","lun","mar","mer","jeu","ven","sam"];

function dateDuJour(n){
  const d0 = (DATA.config||{}).date_jour_1;
  if(!d0 || !/^\d{4}-\d{2}-\d{2}$/.test(d0.trim())) return null;
  const [y,m,j] = d0.trim().split("-").map(Number);
  const d = new Date(y, m-1, j + (n-1));
  return isNaN(d) ? null : d;
}
const fmtDate = (d)=> d ? `${JOURS_SEM[d.getDay()]} ${d.getDate()} ${MOIS[d.getMonth()]}` : "";

function jourActif(){
  const n = (DATA.jours||[]).length;
  for(let i=1;i<=n;i++){
    const d = dateDuJour(i); if(!d) return null;
    const a = new Date(); a.setHours(0,0,0,0);
    if(d.getTime() === a.getTime()) return i;
  }
  return null;
}
function joursAvantDepart(){
  const d = dateDuJour(1); if(!d) return null;
  const a = new Date(); a.setHours(0,0,0,0);
  const n = Math.round((d - a)/86400000);
  return n > 0 ? n : null;
}

const ICON_PIN = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M12 21s7-6.3 7-11a7 7 0 1 0-14 0c0 4.7 7 11 7 11z"/><circle cx="12" cy="10" r="2.2"/></svg>';
const ICON_CHECK = '<svg viewBox="0 0 24 24" fill="none" stroke="#FBF8F0" stroke-width="3"><path d="M5 12.5l4.5 4.5L19 7"/></svg>';

/* ---------- analyse CSV ---------- */
function parseCSV(txt){
  const out=[]; let ligne=[], champ="", q=false;
  for(let i=0;i<txt.length;i++){
    const c=txt[i];
    if(q){
      if(c==='"'){ if(txt[i+1]==='"'){champ+='"';i++;} else q=false; }
      else champ+=c;
    } else if(c==='"') q=true;
    else if(c===','){ ligne.push(champ); champ=""; }
    else if(c==='\n'){ ligne.push(champ); out.push(ligne); ligne=[]; champ=""; }
    else if(c!=='\r') champ+=c;
  }
  if(champ.length||ligne.length){ ligne.push(champ); out.push(ligne); }
  return out.filter(r=> r.some(v=> String(v).trim()!==""));
}
function enObjets(rows){
  if(!rows.length) return [];
  const h = rows[0].map(x=> String(x).trim());
  return rows.slice(1).map(r=>{ const o={}; h.forEach((k,i)=> o[k] = (r[i]||"").trim()); return o; });
}

/* ---------- synchronisation ---------- */
function setSync(cls, txt){
  const s=document.getElementById("sync");
  s.className = "sync "+cls;
  document.getElementById("syncTxt").textContent = txt;
}
async function sync(){
  if(!SHEET_ID){ setSync("", "Contenu local"); return; }
  setSync("load","Mise à jour…");
  try{
    const paq = await Promise.all(ONGLETS.map(async n=>{
      const u = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=${encodeURIComponent(n)}`;
      const r = await fetch(u, {cache:"no-store"});
      if(!r.ok) throw new Error(n);
      return [n, enObjets(parseCSV(await r.text()))];
    }));
    const m = Object.fromEntries(paq);
    const cfg = {}; (m.Config||[]).forEach(r=>{ if(r.cle) cfg[r.cle]=r.valeur; });
    DATA = {
      config: cfg,
      jours: (m.Jours||[]).map(r=>({jour:+r.jour, titre:r.titre, sous_titre:r.sous_titre, ville:r.ville,
              etape:r.etape_transport, hebergement:r.hebergement, adresse:r.adresse_hebergement, alerte:r.alerte, image:r.image})),
      activites: (m.Activites||[]).map(r=>({jour:+r.jour, ordre:+r.ordre, heure:r.heure, type:r.type,
              titre:r.titre, details:r.details, lieu:r.lieu_maps, fixe:r.fixe})),
      options: (m.Options||[]).map(r=>({id:r.id, groupe:r.groupe, jours:r.jours_possibles, titre:r.titre,
              resume:r.resume, details:r.details, lieu:r.lieu_maps, choix:(r.choix||"").trim(), par:r.decide_par})),
      logistique: (m.Logistique||[]).map(r=>({jour:+r.jour, categorie:r.categorie, libelle:r.libelle, valeur:r.valeur})),
      checklistGroupe: (m.Checklist_Groupe||[]).map(r=>({categorie:r.categorie, item:r.item,
              responsable:r.responsable, echeance:r.echeance, fait:(r.fait||"").toUpperCase()==="OUI"})),
      checklistPerso: (m.Checklist_Perso||[]).map(r=>({categorie:r.categorie, item:r.item})),
      contacts: (m.Contacts||[]).map(r=>({nom:r.nom, role:r.role, telephone:r.telephone, note:r.note})),
      notes: (m.Notes_Terrain||[]).map(r=>({date:r.date, auteur:r.auteur, jour:+r.jour, message:r.message}))
                                  .filter(x=> x.message)
    };
    if(!DATA.jours.length) throw new Error("vide");
    jset("cache_data", DATA);
    store.set("cache_ts", new Date().toISOString());
    setSync("ok","À jour");
    rendre();
  }catch(e){
    const ts = store.get("cache_ts");
    setSync("off", ts ? "Hors ligne · "+fmtHeure(ts) : "Contenu local");
  }
}
function fmtHeure(iso){ const d=new Date(iso); return isNaN(d)?"":`${d.getDate()} ${MOIS[d.getMonth()]}`; }

/* ---------- écriture vers le Sheet ---------- */
function toast(t){
  let n=document.getElementById("toast");
  if(!n){ n=el('<div id="toast"></div>'); document.body.appendChild(n); }
  n.textContent=t; n.classList.add("on");
  clearTimeout(n._t); n._t=setTimeout(()=> n.classList.remove("on"), 2600);
}
async function envoyer(charge, message){
  if(!SCRIPT_URL){ toast("Passerelle non branchée — voir l'onglet Infos"); return false; }
  if(!MOI){ MOI = (prompt("Ton prénom, pour que le groupe sache qui a décidé :")||"").trim(); store.set("moi", MOI); }
  charge.par = MOI; charge.auteur = MOI;
  try{
    await fetch(SCRIPT_URL, {method:"POST", mode:"no-cors",
      headers:{"Content-Type":"text/plain;charset=utf-8"}, body:JSON.stringify(charge)});
    toast(message||"Enregistré");
    setTimeout(sync, 1800);
    return true;
  }catch(e){ toast("Envoi impossible — le groupe ne le verra pas encore"); return false; }
}
function optionsDuJour(n){
  return (DATA.options||[]).filter(o=>
    String(o.jours||"").split(",").map(x=>x.trim()).includes(String(n)));
}

/* ---------- rendu : pastilles ---------- */
function rendreJours(){
  const n = document.getElementById("days"); n.innerHTML="";
  const auj = jourActif();
  (DATA.jours||[]).forEach(j=>{
    const d = dateDuJour(j.jour);
    const b = el(`<button class="chip${j.jour===etat.jour?" on":""}${j.jour===auj?" today":""}">
      <b>J${j.jour}</b><i>${esc(d? fmtDate(d) : (j.ville||""))}</i></button>`);
    b.onclick = ()=>{ etat.jour=j.jour; etat.tab="jour"; rendre(); };
    n.appendChild(b);
  });
  const on = n.querySelector(".chip.on");
  if(on) on.scrollIntoView({block:"nearest", inline:"center"});
}

/* ---------- rendu : une journée ---------- */
function vueJour(){
  const j = (DATA.jours||[]).find(x=> x.jour===etat.jour) || (DATA.jours||[])[0];
  if(!j) return `<div class="sect"><p class="empty">Aucune journée n'est encore inscrite dans le fichier source.</p></div>`;
  const d = dateDuJour(j.jour), auj = jourActif()===j.jour;
  const acts = (DATA.activites||[]).filter(a=> a.jour===j.jour).sort((a,b)=> a.ordre-b.ordre);
  const logi = (DATA.logistique||[]).filter(l=> l.jour===j.jour);
  const notes = (DATA.notes||[]).filter(nn=> nn.jour===j.jour);
  let h = "";

  if(j.image) h += `<div class="hero"><img src="photos/${esc(j.image)}" alt="" loading="lazy"
     onerror="this.parentNode.style.display='none';document.querySelector('.dayhead').classList.add('nohero')"></div>`;

    ${auj?'<div class="stamp">Aujourd\'hui</div>':''}
    <div class="eyebrow">${esc(d? fmtDate(d): "Date à confirmer")}${j.ville?" · "+esc(j.ville):""}</div>
    <div class="dayno"><small>Jour</small>${j.jour}</div>
    <h2 class="daytitle">${esc(j.titre)}</h2>
    ${j.sous_titre?`<p class="daysub">${esc(j.sous_titre)}</p>`:""}
    ${j.etape?`<div class="leg">${ICON_PIN}${esc(j.etape)}</div>`:""}
  </section>`;

  if(j.alerte) h += `<div class="sect"><div class="card alerte"><b>À noter</b>${esc(j.alerte)}</div></div>`;

  if(acts.length){
    h += `<div class="sect"><h3>Le programme</h3><ul class="rail">`;
    acts.forEach(a=>{
      const t = (a.type||"").toLowerCase();
      const fige = String(a.fixe||"").toUpperCase()==="OUI";
      h += `<li class="step ${esc(t)}${fige?" fige":""}"><span class="mark"><i></i></span>
        ${a.heure?`<div class="h">${esc(a.heure)}</div>`:""}
        <div class="t">${esc(a.titre)}${fige?'<span class="fixe">fixe</span>':""}</div>
        ${a.details?`<div class="d">${esc(a.details)}</div>`:""}
        ${a.lieu?`<a class="maps" href="${maps(a.lieu)}" target="_blank" rel="noopener">${ICON_PIN}Ouvrir dans Maps</a>`:""}
      </li>`;
    });
    h += `</ul></div>`;
  }

  const opts = optionsDuJour(j.jour);
  if(opts.length){
    const grp = {}; opts.forEach(o=> (grp[o.groupe] = grp[o.groupe]||[]).push(o));
    Object.keys(grp).forEach(g=>{
      const pris = grp[g].filter(o=> o.choix===String(j.jour)).length;
      h += `<div class="sect"><h3>${esc(g)} <span class="progress">${pris? pris+" retenue"+(pris>1?"s":"") : "à décider"}</span></h3>`;
      grp[g].forEach(o=>{
        const ici = o.choix===String(j.jour);
        const non = (o.choix||"").toUpperCase()==="NON";
        const ailleurs = o.choix && !ici && !non;
        h += `<div class="opt${ici?" choisi":""}${non||ailleurs?" ecarte":""}">
          ${ici?`<span class="etat">Retenu pour aujourd'hui${o.par?" · "+esc(o.par):""}</span>`:""}
          ${ailleurs?`<span class="etat gris">Prévu au jour ${esc(o.choix)}</span>`:""}
          ${non?`<span class="etat gris">Écarté</span>`:""}
          <h4>${esc(o.titre)}</h4>
          ${o.resume?`<p>${esc(o.resume)}</p>`:""}
          ${ici&&o.details?`<p style="color:var(--ink)">${esc(o.details)}</p>`:""}
          <div class="actes">
            ${o.lieu?`<a class="maps" style="margin:0" href="${maps(o.lieu)}" target="_blank" rel="noopener">${ICON_PIN}Maps</a>`:""}
            ${ici
              ? `<button class="bt" data-opt="${esc(o.id)}" data-val="">Remettre au menu</button>`
              : `<button class="bt oui" data-opt="${esc(o.id)}" data-val="${j.jour}">On fait ça aujourd'hui</button>`}
            ${(non||ici)?"":`<button class="bt" data-opt="${esc(o.id)}" data-val="NON">Pas cette fois</button>`}
            ${non?`<button class="bt" data-opt="${esc(o.id)}" data-val="">Remettre au menu</button>`:""}
          </div></div>`;
      });
      h += `</div>`;
    });
  }

  if(j.hebergement || j.adresse){
    h += `<div class="sect"><h3>Où l'on dort</h3><div class="card">
      <div class="row"><div class="k">Logement</div><div class="v">${esc(j.hebergement||"—")}</div></div>
      ${j.adresse?`<div class="row"><div class="k">Adresse</div><div class="v">${esc(j.adresse)}
        <a class="maps" href="${maps(j.adresse)}" target="_blank" rel="noopener">${ICON_PIN}Y aller</a></div></div>`:""}
    </div></div>`;
  }

  if(logi.length){
    h += `<div class="sect"><h3>Logistique</h3><div class="card">`;
    logi.forEach(l=>{
      h += `<div class="row"><div class="k">${esc(l.categorie)}</div><div class="v">${esc(l.libelle)}
        ${l.valeur?`<br><em>${esc(l.valeur)}</em>`:`<br><em>à compléter dans le fichier</em>`}</div></div>`;
    });
    h += `</div></div>`;
  }

  h += `<div class="sect"><h3>Mot du groupe</h3><div class="card">`;
  if(notes.length){
    notes.forEach(nn=> h += `<div class="row"><div class="k">${esc(nn.auteur||"—")}</div><div class="v">${esc(nn.message)}</div></div>`);
  } else {
    h += `<p class="empty" style="margin:0">Rien de neuf pour cette journée.</p>`;
  }
  h += `<div class="compo"><textarea id="msg" placeholder="Un mot pour le groupe…"></textarea>
        <button class="bt oui" id="envMsg" style="align-self:stretch">Envoyer</button></div>`;
  h += `</div></div>`;

  const cit = (DATA.config||{}).citation;
  if(cit && j.jour===((DATA.jours||[]).length)) h += `<div class="foot"><p>${esc(cit)}</p></div>`;
  return h;
}

/* ---------- rendu : préparation ---------- */
function vuePrep(){
  const perso = jget("check_perso", {});
  const g = DATA.checklistGroupe||[], p = DATA.checklistPerso||[];
  const faitsG = g.filter(x=> x.fait).length;
  const faitsP = p.filter(x=> perso[x.item]).length;
  const cd = joursAvantDepart();
  let h = "";

  if(cd) h += `<div class="sect" style="padding-top:20px"><div class="card" style="text-align:center">
     <div class="eyebrow">Départ</div>
     <div class="dayno" style="font-size:44px;margin-top:2px">${cd}</div>
     <div class="daysub" style="margin-top:0">dodo${cd>1?"s":""} avant l'Italie</div></div></div>`;

  h += `<div class="sect"><h3>Le groupe <span class="progress">${faitsG}/${g.length}</span></h3><div class="card">`;
  if(!g.length) h += `<p class="empty" style="margin:0">Aucun item pour l'instant.</p>`;
  let cat = null;
  g.forEach(it=>{
    if(it.categorie !== cat){ cat = it.categorie;
      h += `<div class="k" style="font-family:var(--mono);font-size:10.5px;letter-spacing:.08em;text-transform:uppercase;color:var(--indigo);padding:12px 0 4px">${esc(cat)}</div>`; }
    h += `<button class="check grp${it.fait?" done":""}" data-item="${esc(it.item)}" data-fait="${it.fait?1:0}">
      <span class="box">${ICON_CHECK}</span>
      <span class="lbl">${esc(it.item)}${it.responsable?`<span class="who">${esc(it.responsable)}${it.echeance?" · "+esc(it.echeance):""}</span>`:""}</span></button>`;
  });
  h += `</div><p class="hint">Ces cases sont partagées : ce que tu coches, tout le groupe le voit.</p></div>`;

  h += `<div class="sect"><h3>Ma valise <span class="progress">${faitsP}/${p.length}</span></h3><div class="card">`;
  cat = null;
  p.forEach(it=>{
    if(it.categorie !== cat){ cat = it.categorie;
      h += `<div style="font-family:var(--mono);font-size:10.5px;letter-spacing:.08em;text-transform:uppercase;color:var(--indigo);padding:12px 0 4px">${esc(cat)}</div>`; }
    h += `<button class="check perso${perso[it.item]?" done":""}" data-item="${esc(it.item)}">
      <span class="box">${ICON_CHECK}</span><span class="lbl">${esc(it.item)}</span></button>`;
  });
  h += `</div><p class="hint">Cette liste reste sur ton appareil. Personne d'autre ne la voit.</p></div>`;
  return h;
}

/* ---------- rendu ---------- */
function rendre(){
  rendreJours();
  const v = document.getElementById("view");
  v.innerHTML = etat.tab==="jour" ? vueJour() : etat.tab==="prep" ? vuePrep() : vueInfo();
  document.querySelectorAll(".tab").forEach(t=> t.classList.toggle("on", t.dataset.tab===etat.tab));
  document.getElementById("days").style.display = etat.tab==="jour" ? "" : "none";

  v.querySelectorAll(".check.perso").forEach(b=>{
    b.onclick = ()=>{
      const m = jget("check_perso", {}); const k = b.dataset.item;
      m[k] = !m[k]; jset("check_perso", m); rendre();
    };
  });
  v.querySelectorAll("[data-opt]").forEach(b=>{
    b.onclick = ()=>{
      const o = (DATA.options||[]).find(x=> x.id===b.dataset.opt);
      if(o) o.choix = b.dataset.val;            // affichage immédiat
      jset("cache_data", DATA); rendre();
      envoyer({action:"option", id:b.dataset.opt, choix:b.dataset.val},
              b.dataset.val==="NON" ? "Écarté" : b.dataset.val ? "Retenu" : "Remis au menu");
    };
  });
  v.querySelectorAll(".check.grp").forEach(b=>{
    b.onclick = ()=>{
      const it = (DATA.checklistGroupe||[]).find(x=> x.item===b.dataset.item);
      if(it) it.fait = b.dataset.fait!=="1";
      jset("cache_data", DATA); rendre();
      envoyer({action:"check", item:b.dataset.item, fait:b.dataset.fait!=="1"}, "Mis à jour");
    };
  });
  const env = document.getElementById("envMsg");
  if(env) env.onclick = ()=>{
    const t = document.getElementById("msg");
    if(!t.value.trim()) return;
    envoyer({action:"note", jour:etat.jour, message:t.value.trim()}, "Envoyé au groupe");
    t.value = "";
  };
  const su = document.getElementById("surl");
  if(su) su.onchange = ()=>{ SCRIPT_URL = su.value.trim(); store.set("script_url", SCRIPT_URL);
                             toast(SCRIPT_URL?"Passerelle branchée":"Passerelle retirée"); };
  const mo = document.getElementById("moi");
  if(mo) mo.onchange = ()=>{ MOI = mo.value.trim(); store.set("moi", MOI); };
  const sid = document.getElementById("sid");
  if(sid) sid.onchange = ()=>{
    const raw = sid.value.trim();
    const m = raw.match(/\/d\/([a-zA-Z0-9-_]+)/);
    SHEET_ID = m ? m[1] : raw;
    store.set("sheet_id", SHEET_ID); sync();
  };
  window.scrollTo({top:0});
}

document.querySelectorAll(".tab").forEach(t=>{
  t.onclick = ()=>{ etat.tab = t.dataset.tab; rendre(); };
});

etat.jour = jourActif() || 1;
rendre();
